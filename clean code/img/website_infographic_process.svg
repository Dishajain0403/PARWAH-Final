<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" width="1400" height="520">

<style>
.title{font:700 44px Arial; fill:#2b2b2b}
.stepTitle{font:700 18px Arial; fill:#222}
.stepText{font:14px Arial; fill:#555}
.shadow{filter:url(#shadow)}
</style>

<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
  <feDropShadow dx="0" dy="4" stdDeviation="6"/>
</filter>

<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b2c"/>
</marker>
</defs>

<!-- Title -->
<text x="700" y="70" text-anchor="middle" class="title">Our Implementation Process</text>

<!-- Flow path -->
<path d="M120 330 C280 140, 430 460, 600 280 S900 140, 1180 260"
stroke="#ff6b2c"
stroke-width="6"
stroke-dasharray="14 10"
marker-end="url(#arrow)"
fill="none"/>

<!-- STEP 1 -->
<g class="shadow">
<rect x="60" y="200" width="200" height="120" rx="16" fill="#ffffff"/>
<rect x="60" y="200" width="200" height="12" fill="#4cc9f0"/>
<text x="160" y="245" text-anchor="middle" class="stepTitle">Consultation</text>
<text x="160" y="270" text-anchor="middle" class="stepText">Understand your</text>
<text x="160" y="288" text-anchor="middle" class="stepText">institution needs</text>
</g>

<!-- idea icon -->
<g>
<circle cx="160" cy="160" r="28" fill="#ffd166"/>
<rect x="155" y="140" width="10" height="18" fill="#333"/>
<rect x="152" y="158" width="16" height="6" fill="#333"/>
</g>

<!-- STEP 2 -->
<g class="shadow">
<rect x="420" y="330" width="200" height="120" rx="16" fill="#ffffff"/>
<rect x="420" y="330" width="200" height="12" fill="#06d6a0"/>
<text x="520" y="375" text-anchor="middle" class="stepTitle">Customization</text>
<text x="520" y="400" text-anchor="middle" class="stepText">Tailoring the</text>
<text x="520" y="418" text-anchor="middle" class="stepText">program</text>
</g>

<!-- magnifier -->
<g>
<circle cx="520" cy="250" r="26" fill="#4cc9f0"/>
<circle cx="520" cy="250" r="14" fill="#ffffff"/>
<rect x="535" y="265" width="30" height="8" transform="rotate(40 535 265)" fill="#333"/>
</g>

<!-- STEP 3 -->
<g class="shadow">
<rect x="760" y="160" width="220" height="120" rx="16" fill="#ffffff"/>
<rect x="760" y="160" width="220" height="12" fill="#ef476f"/>
<text x="870" y="205" text-anchor="middle" class="stepTitle">Onboarding</text>
<text x="870" y="230" text-anchor="middle" class="stepText">Training staff</text>
<text x="870" y="248" text-anchor="middle" class="stepText">Launching program</text>
</g>

<!-- gears -->
<g>
<circle cx="870" cy="120" r="18" fill="#06d6a0"/>
<circle cx="900" cy="140" r="14" fill="#ffd166"/>
<circle cx="840" cy="140" r="14" fill="#ff6b6b"/>
</g>

<!-- STEP 4 -->
<g class="shadow">
<rect x="1080" y="300" width="220" height="120" rx="16" fill="#ffffff"/>
<rect x="1080" y="300" width="220" height="12" fill="#3a86ff"/>
<text x="1190" y="345" text-anchor="middle" class="stepTitle">Support</text>
<text x="1190" y="370" text-anchor="middle" class="stepText">Ongoing assistance</text>
<text x="1190" y="388" text-anchor="middle" class="stepText">Optimization</text>
</g>

<!-- laptop -->
<g>
<rect x="1160" y="230" width="70" height="40" rx="6" fill="#3a86ff"/>
<rect x="1165" y="235" width="60" height="28" fill="#ffffff"/>
<rect x="1150" y="270" width="90" height="10" rx="4" fill="#555"/>
<polyline points="1180,250 1190,260 1210,240"
stroke="#06d6a0"
stroke-width="4"
fill="none"/>
</g>

</svg>
