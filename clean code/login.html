<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | Parwah</title>
    
    <!-- CSS Dependencies -->
    <link href="css/styles.css" rel="stylesheet" />
    <link href="css/login.css" rel="stylesheet" />
    
    <!-- Main Script for Component Injection -->
    <script src="js/components-data.js"></script>
    <script defer src="js/script.js"></script>
    <script defer src="parwah-dashboard/js/api.js"></script>
    <script defer src="parwah-dashboard/js/auth.js"></script>
</head>

<body>
    <!-- Reusable Navbar -->
    <div id="navbar"></div>

    <main class="login-page">
        <div class="login-wrapper">
            <div class="login-container">
                <!-- LEFT PANEL -->
                <div class="login-panel-left">
                    <div class="login-brand">
                        <img alt="Parwah Logo" src="img/logowhite.png" style="width:100px; height:48px;" />
                    </div>
                    <div class="login-tagline">
                        <h2>Welcome back. 🌸</h2>
                        <p>Your wellbeing is our priority. Log in to access counseling and support.</p>
                        <ul class="login-features">
                            <li>✅ 1-on-1 counseling</li>
                            <li>✅ Wellbeing check-ins</li>
                            <li>✅ Safe &amp; Confidential</li>
                        </ul>
                    </div>
                </div>
                
                <!-- RIGHT PANEL -->
                <div class="login-panel-right">
                    <div id="alertContainer"></div>
                    <div class="step-form active" id="formLogin">
                        <h2>Sign In</h2>
                        <form id="loginForm">
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input id="email" placeholder="you@school.edu" required type="email" />
                            </div>
                            <div class="form-group">
                                <label for="password">Password</label>
                                <input id="password" placeholder="••••••••" required type="password" />
                            </div>
                            <button class="primary-btn w-full" type="submit">Sign In &rarr;</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Reusable Footer -->
    <div id="footer"></div>
</body>
</html>
