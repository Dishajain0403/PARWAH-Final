<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Details – Parwah</title>
  <link rel="stylesheet" href="../../css/style.css">
  <script>
    window.PARWAH_CONFIG = { root: '../../../' };
    document.documentElement.style.visibility = 'hidden';
  </script>
  <script src="../../js/api.js"></script>
  <script src="../../js/mockData.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    Auth.requireAuth();
  </script>
</head>
<body>
  <div class="app">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Notification Bell -->
    <a href="../announcements.html" class="notification-bell" aria-label="Announcements">
      🔔
      <span class="badge" id="notif-count">3</span>
    </a>

    <nav class="sidebar" id="sidebar">
      <a href="../../../index.html" class="logo">
        <div class="logo-icon">
          <img src="../../../img/logo.svg" alt="Parwah" class="logo-img">
        </div>
      </a>
      <ul class="nav-menu">
        <li class="nav-item"><a href="../../index.html" class="nav-link">Dashboard</a></li>
        <li class="nav-item"><a href="../announcements.html" class="nav-link">Announcements</a></li>
        <li class="nav-item"><a href="../knowledge-hub.html" class="nav-link active">Knowledge Hub</a></li>
      </ul>
    </nav>
    <main class="main space-y-6">
      <div id="course-container">
        <!-- Dynamic content -->
      </div>
    </main>
  </div>
  <script>
    function renderCourse() {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'));
      const course = mockData.courses.find(c => c.id === id);
      const container = document.getElementById('course-container');

      if (!course) {
        container.innerHTML = `<h1>Course Not Found</h1><a href="../knowledge-hub.html">Back to Hub</a>`;
        return;
      }

      const progress = State.getCourseProgress(course.id);
      const completedLessons = State.getProgress()[course.id] || [];

      container.innerHTML = `
        <div class="page-header">
          <div class="flex items-center gap-4 mb-2">
            <span class="text-4xl">${course.icon}</span>
            <h1>${course.title}</h1>
          </div>
          <p class="text-muted">${course.desc}</p>
          <div class="accent-bar"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="col-span-2 space-y-4">
            <div class="card p-6">
              <h2 class="text-xl font-semibold mb-4 text-primary">Lessons List</h2>
              <div class="space-y-3">
                ${course.lessons.map(l => {
                  const isDone = completedLessons.includes(l.id);
                  return `
                    <div class="lesson-item flex items-center justify-between p-4 border rounded-lg ${isDone ? 'bg-green-50' : 'bg-white'}">
                      <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center ${isDone ? 'bg-green-500 text-white' : 'bg-gray-100'}">
                          ${isDone ? '✓' : l.id}
                        </div>
                        <div>
                          <h4 class="font-medium">${l.title}</h4>
                          <p class="text-xs text-muted">🕐 ${l.duration}</p>
                        </div>
                      </div>
                      <a href="lesson.html?id=${course.id}&lesson=${l.id}" class="btn btn-sm ${isDone ? 'btn-ghost' : 'btn-soft'}">
                        ${isDone ? 'Re-watch' : 'Start'}
                      </a>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </div>
          
          <div class="card p-6 h-fit">
            <h3 class="font-semibold mb-4">Your Progress</h3>
            <div class="text-3xl font-bold text-primary mb-2">${progress}%</div>
            <div class="progress-bar mb-4">
              <div class="progress-fill" style="width: ${progress}%"></div>
            </div>
            <p class="text-sm text-muted">Complete all lessons to earn a wellness badge!</p>
          </div>
        </div>
      `;
    }
    document.addEventListener('DOMContentLoaded', renderCourse);
  </script>
</body>
</html>
