<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Match – Parwah Games</title>
  <script>
    window.PARWAH_CONFIG = { root: '../../../' };
    document.documentElement.style.visibility = 'hidden';
  </script>
  <script src="../../js/api.js"></script>
  <script>
    Auth.requireAuth();
  </script>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .game-area {
      max-width: 400px;
      margin: 2rem auto;
      text-align: center;
    }
    .target-color {
      height: 100px;
      border-radius: var(--radius-lg);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    .option {
      height: 80px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .option:active { transform: scale(0.95); }
    .score { font-size: 1.2rem; margin-bottom: 1rem; }
  </style>
</head>
<body class="bg-light">
  <main class="main p-6">
    <div class="game-area">
      <h1>Color Match</h1>
      <p class="mb-6">Tap the color that matches the name!</p>
      <div class="score">Score: <span id="scoreValue">0</span></div>
      <div id="target" class="target-color"></div>
      <div id="options" class="options"></div>
      <div class="mt-12">
        <button onclick="history.back()" class="btn btn-outline">Back to Dashboard</button>
      </div>
    </div>
  </main>

  <script>
    const colors = [
      { name: 'Blue', hex: '#4f46e5' },
      { name: 'Red', hex: '#ef4444' },
      { name: 'Green', hex: '#22c55e' },
      { name: 'Yellow', hex: '#eab308' },
      { name: 'Purple', hex: '#a855f7' },
      { name: 'Orange', hex: '#f97316' }
    ];

    let score = 0;
    let targetColor;

    function nextTurn() {
      // Pick random target
      targetColor = colors[Math.floor(Math.random() * colors.length)];
      const targetDisplay = document.getElementById('target');
      
      // Shuffle names but pick a different color for background to make it tricky (Stroop effect)
      const bgColor = colors[Math.floor(Math.random() * colors.length)];
      targetDisplay.style.backgroundColor = bgColor.hex;
      targetDisplay.innerText = targetColor.name;

      // Render options
      const optionsContainer = document.getElementById('options');
      optionsContainer.innerHTML = '';
      
      // Ensure target hex is in options
      const roundColors = [...colors].sort(() => 0.5 - Math.random()).slice(0, 4);
      if (!roundColors.find(c => c.hex === targetColor.hex)) {
        roundColors[0] = targetColor;
      }
      
      roundColors.sort(() => 0.5 - Math.random()).forEach(c => {
        const div = document.createElement('div');
        div.className = 'option';
        div.style.backgroundColor = c.hex;
        div.onclick = () => {
          if (c.hex === targetColor.hex) {
            score++;
            document.getElementById('scoreValue').innerText = score;
            nextTurn();
          } else {
            alert('Oops! Resetting score.');
            score = 0;
            document.getElementById('scoreValue').innerText = score;
            nextTurn();
          }
        };
        optionsContainer.appendChild(div);
      });
    }

    nextTurn();
  </script>
</body>
</html>
