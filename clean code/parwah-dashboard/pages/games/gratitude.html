<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gratitude Garden – Parwah Games</title>
  <script>
    window.PARWAH_CONFIG = { root: '../../../' };
    document.documentElement.style.visibility = 'hidden';
  </script>
  <script src="../../js/api.js"></script>
  <script>
    Auth.requireAuth();
  </script>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    .garden {
      min-height: 400px;
      background: #f0fdf4;
      border-radius: var(--radius-lg);
      padding: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-content: flex-start;
      border: 2px dashed #bbf7d0;
    }
    .flower {
      text-align: center;
      animation: bloom 0.5s ease-out;
    }
    @keyframes bloom {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
    .flower-text {
      font-size: 0.75rem;
      color: #166534;
      max-width: 80px;
      word-wrap: break-word;
    }
  </style>
</head>
<body class="bg-light">
  <main class="main p-6">
    <div class="max-w-2xl mx-auto text-center">
      <h1>Gratitude Garden</h1>
      <p class="mb-8">Plant a flower for each thing you're grateful for today.</p>
      
      <div class="flex gap-2 mb-8">
        <input type="text" id="gratitudeInput" placeholder="What are you thankful for?" class="flex-1 p-3 rounded-lg border">
        <button onclick="plantFlower()" class="btn btn-primary">Plant Flower 🌸</button>
      </div>

      <div id="garden" class="garden"></div>

      <div class="mt-8">
        <button onclick="history.back()" class="btn btn-outline">Back to Dashboard</button>
      </div>
    </div>
  </main>

  <script>
    const garden = document.getElementById('garden');
    const input = document.getElementById('gratitudeInput');
    const flowers = ['🌸', '🌺', '🌻', '🌼', '🌷', '🌿'];

    function loadGarden() {
      const items = JSON.parse(localStorage.getItem('parwah_gratitude') || '[]');
      garden.innerHTML = '';
      items.forEach(item => addFlowerToUI(item.text, item.icon));
    }

    function addFlowerToUI(text, icon) {
      const div = document.createElement('div');
      div.className = 'flower';
      div.innerHTML = `
        <div style="font-size: 2.5rem">${icon}</div>
        <div class="flower-text">${text}</div>
      `;
      garden.appendChild(div);
    }

    function plantFlower() {
      const text = input.value.trim();
      if (!text) return;
      
      const icon = flowers[Math.floor(Math.random() * flowers.length)];
      const items = JSON.parse(localStorage.getItem('parwah_gratitude') || '[]');
      items.push({ text, icon });
      localStorage.setItem('parwah_gratitude', JSON.stringify(items));
      
      addFlowerToUI(text, icon);
      input.value = '';
    }

    loadGarden();
  </script>
</body>
</html>
