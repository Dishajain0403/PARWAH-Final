<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop Details – Parwah</title>
  <link rel="stylesheet" href="../css/style.css">
  <script>
    window.PARWAH_CONFIG = { root: '../../' };
    document.documentElement.style.visibility = 'hidden';
  </script>
  <script src="../js/api.js"></script>
  <script src="../js/mockData.js"></script>
  <script>
    Auth.requireAuth();
  </script>
</head>
<body>
  <div class="app">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Notification Bell -->
    <a href="announcements.html" class="notification-bell" aria-label="Announcements">
      🔔
      <span class="badge" id="notif-count">3</span>
    </a>

    <nav class="sidebar" id="sidebar">
      <a href="../../index.html" class="logo">
        <div class="logo-icon">
          <img src="../../img/logo.svg" alt="Parwah" class="logo-img">
        </div>
      </a>
      <ul class="nav-menu">
        <li class="nav-item"><a href="../index.html" class="nav-link">Dashboard</a></li>
        <li class="nav-item"><a href="announcements.html" class="nav-link">Announcements</a></li>
        <li class="nav-item"><a href="workshops.html" class="nav-link">Workshops</a></li>
        <li class="nav-item"><a href="counselling.html" class="nav-link">Counselling</a></li>
        <li class="nav-item"><a href="knowledge-hub.html" class="nav-link">Knowledge Hub</a></li>
        <li class="nav-item"><a href="anonymous-reachout.html" class="nav-link">Anonymous Reachout</a></li>
        <li class="nav-item"><a href="feedback.html" class="nav-link">Feedback</a></li>
        <li class="nav-item"><a href="fun-activities.html" class="nav-link">Fun Activities</a></li>
      </ul>
    </nav>
    <main class="main space-y-6">
      <div id="details-container">
        <!-- Dynamic content -->
      </div>
    </main>
  </div>
  <script src="../js/app.js"></script>
  <script>
    function renderDetails() {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'));
      const workshop = mockData.workshops.find(w => w.id === id);
      const container = document.getElementById('details-container');

      if (!workshop) {
        container.innerHTML = `<h1>Workshop Not Found</h1><a href="workshops.html">Back to Workshops</a>`;
        return;
      }

      container.innerHTML = `
        <div class="page-header">
          <div class="flex items-center gap-4 mb-2">
            <span class="text-4xl">${workshop.icon}</span>
            <h1>${workshop.title}</h1>
          </div>
          <p class="text-muted">Hosted by ${workshop.host}</p>
          <div class="accent-bar"></div>
        </div>
        
        <div class="card card-lg space-y-4">
          <div class="grid grid-cols-1 gap-4">
            <div class="info-box">
              <span class="label">Date & Time</span>
              <p>${workshop.date}</p>
            </div>
          </div>
          
          <div class="description-section">
            <h2 class="text-lg font-semibold mb-2">About this Workshop</h2>
            <p>${workshop.description}</p>
          </div>
          
          <div class="flex gap-4 pt-4">
            <button class="btn btn-primary btn-lg flex-1" data-action="join_workshop" data-id="${workshop.id}">Register Now</button>
            <button class="btn btn-outline btn-lg" onclick="history.back()">Back</button>
          </div>
        </div>
      `;
    }
    document.addEventListener('DOMContentLoaded', renderDetails);
  </script>
</body>
</html>
